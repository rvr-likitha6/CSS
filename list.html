<!DOCTYPE html>
<html>
<head>
    <title>List Styling</title>
    <style>
        ul {
            list-style-type: square;
        }

        li {
            color: brown;
        }
    </style>
</head>
<body>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</body>
</html>
