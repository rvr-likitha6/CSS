<!DOCTYPE html>
<html>
<head>
    <title>Button Styling</title>
    <style>
        button {
            background-color: purple;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkviolet;
        }
    </style>
</head>
<body>
    <button>Click Me</button>
</body>
</html>
