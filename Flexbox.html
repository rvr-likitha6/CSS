<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Basic</title>
    <style>
        .container {
            display: flex;
            gap: 10px;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: teal;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
</body>
</html>
