<!DOCTYPE html>
<html>
<head>
<style>
ul {
    list-style: none;
    background-color: #333;
    padding: 0;
}

li {
    display: inline-block;
}

a {
    color: white;
    padding: 14px 20px;
    display: block;
    text-decoration: none;
}

a:hover {
    background-color: #555;
}
</style>
</head>
<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</body>
</html>
