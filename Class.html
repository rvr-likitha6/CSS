<!DOCTYPE html>
<html>
<head>
    <title>Class and ID</title>
    <style>
        .highlight {
            color: green;
            font-weight: bold;
        }

        #special {
            color: red;
            font-size: 21px;
        }
    </style>
</head>
<body>
    <p class="highlight">This uses a class</p>
    <p id="special">This uses an ID</p>
</body>
</html>
